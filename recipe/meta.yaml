{% set name = "optparse-pretty" %}
{% set version = "0.1.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/optparse-pretty-{{ version }}.tar.gz
  sha256: b03629f4f72140746feae3a8806819a32bd5d8c2318afe8fc5489d25e0e240a4

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . -vvv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - pip
  run:
    - python >={{ python_min }}

test:
  requires:
    - python {{ python_min }}
  imports:
    - optparse_mooi

about:
  home: https://github.com/gvalkov/optparse-pretty
  summary: A more compact help formatter for optparse
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  doc_url: https://optparse-pretty.readthedocs.io/en/latest/

extra:
  recipe-maintainers:
    - mencian
